services:
  cs-valkey:
    container_name: cryptoswarm-valkey
    image: valkey/valkey:8
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "valkey-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10
    labels:
      com.cryptoswarm.service: valkey
      com.cryptoswarm.tier: infra

  cs-timescale:
    container_name: cryptoswarm-timescale
    image: timescale/timescaledb:latest-pg16
    environment:
      POSTGRES_DB: cryptoswarm_ts
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5434:5432"
    volumes:
      - timescale_data:/var/lib/postgresql/data
      - ./migrations/timescale:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 3s
      retries: 15
    labels:
      com.cryptoswarm.service: timescale
      com.cryptoswarm.tier: infra

  cs-postgres:
    container_name: cryptoswarm-postgres
    image: postgres:16
    environment:
      POSTGRES_DB: cryptoswarm
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./migrations/postgres:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 3s
      retries: 15
    labels:
      com.cryptoswarm.service: postgres
      com.cryptoswarm.tier: infra

  # ── Application services ────────────────────────────────────────────────────

  cs-python:
    container_name: cryptoswarm-python
    image: cryptoswarm/python:latest
    build:
      context: ../backend
      dockerfile: Dockerfile
    env_file: ../.env
    environment:
      VALKEY_URL: redis://cs-valkey:6379
      TIMESCALE_DSN: postgresql://postgres:postgres@cs-timescale:5432/cryptoswarm_ts
      POSTGRES_DSN: postgresql://postgres:postgres@cs-postgres:5432/cryptoswarm
    ports:
      - "8000:8000"
      - "50051:50051"
    depends_on:
      cs-valkey:    { condition: service_healthy }
      cs-timescale: { condition: service_healthy }
      cs-postgres:  { condition: service_healthy }
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    read_only: true
    tmpfs:
      - /tmp
    healthcheck:
      test: ["CMD", "python3", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 30s
      timeout: 5s
      start_period: 60s
      retries: 3
    labels:
      com.cryptoswarm.service: python-backend
      com.cryptoswarm.tier: app

  cs-go:
    container_name: cryptoswarm-go
    image: cryptoswarm/go:latest
    build:
      context: ../go-backend
      dockerfile: Dockerfile
    env_file: ../.env
    environment:
      GRPC_ADDR: cs-python:50051
    ports:
      - "8080:8080"
    depends_on:
      cs-python:    { condition: service_healthy }
      cs-postgres:  { condition: service_healthy }
      cs-timescale: { condition: service_healthy }
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    read_only: true
    tmpfs:
      - /tmp
    labels:
      com.cryptoswarm.service: go-gateway
      com.cryptoswarm.tier: app

  cs-web:
    container_name: cryptoswarm-web
    image: cryptoswarm/web:latest
    build:
      context: ../frontend
      dockerfile: Dockerfile
    environment:
      NEXT_PUBLIC_GO_API: http://cs-go:8080
      NEXT_PUBLIC_GO_WS: ws://cs-go:8080/ws
    ports:
      - "3000:3000"
    depends_on:
      cs-go: { condition: service_started }
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    read_only: true
    tmpfs:
      - /tmp
    labels:
      com.cryptoswarm.service: web-frontend
      com.cryptoswarm.tier: app

volumes:
  timescale_data:
  postgres_data:
